name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            label: arm64
          - abi: armeabi-v7a
            label: armv7
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Compute image tag
      id: img
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        echo "tag=ghcr.io/$OWNER/translator-build:$(sha256sum Dockerfile | cut -c1-12)" >> $GITHUB_OUTPUT

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Pull or build image
      run: |
        TAG=${{ steps.img.outputs.tag }}
        if ! docker pull "$TAG" 2>/dev/null; then
          echo "Image missing, building..."
          docker build -t "$TAG" .
          docker push "$TAG"
        fi

    - name: Build ${{ matrix.label }}
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/build/build/dev.davidv.translator/ \
          --user $(id -u):$(id -g) \
          ${{ steps.img.outputs.tag }} \
          ./gradlew assembleRelease -PtargetAbi=${{ matrix.abi }}

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apk-${{ matrix.label }}
        path: app/build/outputs/apk/**/*.apk
        retention-days: 30
